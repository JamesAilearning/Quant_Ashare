name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install git+https://github.com/microsoft/qlib.git@8fd6d5ca7eab59a69bf5c62f84e8b4e2a4e8910b
          pip install -e ".[dev]"
        continue-on-error: true

      - name: Lint (ruff)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: ruff check src/ tests/ scripts/

      - name: Type check (mypy)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: mypy src/ --ignore-missing-imports
        continue-on-error: true

      - name: Run logic tests
        run: pytest tests/logic/ -q --tb=short
        env:
          RUN_E2E: "0"

      - name: Run governance tests
        run: pytest tests/governance/ -q --tb=short

      - name: Run regression tests
        run: pytest tests/regression/ -q --tb=short
        env:
          RUN_E2E: "0"
