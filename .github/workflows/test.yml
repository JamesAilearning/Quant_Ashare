name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # NO ``continue-on-error: true`` here on purpose. If qlib install
      # fails (network blip, garbage-collected commit, transient pip
      # error), this step MUST fail loudly. Previously the flag was
      # set, which combined with the codebase's pervasive
      # ``pytest.importorskip("qlib")`` produced a silent-green CI
      # path where qlib-dependent tests were all skipped while the
      # workflow reported success. If the install becomes flaky in
      # practice, add a retry around the pip command rather than
      # bringing back the swallow. Audit P1-13.
      # The qlib install MUST carry the same numpy/scipy bounds as
      # pyproject: an unconstrained first resolve pulls numpy-2-era wheels
      # (scipy>=1.16 etc.), then the second install downgrades numpy to <2
      # per the project pin while leaving scipy compiled/written against
      # numpy 2 — qlib.backtest's import chain then dies with
      # "No module named 'numpy.lib.array_utils'" on 3.11/3.12 (3.10 dodges
      # it only because new scipy wheels skip 3.10). Exposed by PR-C's
      # execution-timing probe, the first fast test to genuinely import
      # qlib.backtest in CI.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "numpy>=1.24,<2.0" "scipy>=1.10,<1.14" git+https://github.com/microsoft/qlib.git@8fd6d5ca7eab59a69bf5c62f84e8b4e2a4e8910b
          pip install -e ".[dev]"

      - name: Lint (ruff)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: ruff check src/ tests/ scripts/

      # Strict mode is the default after `add-mypy-strict-everywhere`
      # batch 4 (this PR) — see [tool.mypy] in pyproject.toml. The
      # whitelist that grew through batches 1-3 is gone; the only
      # opt-out is ``src.factor_mining.*`` (active parallel workstream;
      # a follow-up PR removes that opt-out once it stabilises).
      # ``--follow-imports=silent`` keeps the run focused on the
      # PR's tree without pulling transitive third-party errors into
      # the signal. No ``continue-on-error`` — strict is the rule.
      - name: Type check (mypy --strict by default)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: |
          mypy --follow-imports=silent --ignore-missing-imports \
            --explicit-package-bases \
            src/ scripts/ web/operator_ui/

      # Coverage runs on a single matrix slot (ubuntu-3.11) so we
      # collect one canonical coverage.xml per PR; running cov on all
      # 6 jobs would 6x the artifact storage for no extra signal.
      # The other 5 jobs still run the test suite for the
      # OS / Python coverage matrix; they just don't emit coverage.
      #
      # Each test suite under ``tests/`` runs as a separate pytest
      # invocation (PIT singleton isolation — see PIT block below).
      # To consolidate coverage across them, the ubuntu-3.11 slot
      # uses ``--cov=src`` on the FIRST run (which erases any prior
      # ``.coverage`` data) and ``--cov=src --cov-append`` on every
      # subsequent run. The LAST run also emits ``coverage.xml``,
      # which then includes data from every suite. Other slots run
      # plain pytest without coverage. Audit P1-15.
      - name: Run logic tests (with coverage)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: pytest tests/logic/ -q --tb=short --cov=src
        env:
          RUN_E2E: "0"

      - name: Run logic tests
        if: matrix.os != 'ubuntu-latest' || matrix.python-version != '3.11'
        run: pytest tests/logic/ -q --tb=short
        env:
          RUN_E2E: "0"

      - name: Run governance tests (with coverage)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: pytest tests/governance/ -q --tb=short --cov=src --cov-append

      - name: Run governance tests
        if: matrix.os != 'ubuntu-latest' || matrix.python-version != '3.11'
        run: pytest tests/governance/ -q --tb=short

      - name: Run regression tests (with coverage)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: pytest tests/regression/ -q --tb=short --cov=src --cov-append
        env:
          RUN_E2E: "0"

      - name: Run regression tests
        if: matrix.os != 'ubuntu-latest' || matrix.python-version != '3.11'
        run: pytest tests/regression/ -q --tb=short
        env:
          RUN_E2E: "0"

      # PIT data-pipeline + query-layer tests live in their own
      # directories. We run them as SEPARATE pytest invocations
      # (not added to the directories above) for two reasons:
      #   1. The qlib canonical runtime is a process-singleton —
      #      `tests/pit/test_query_layer.py` initialises it with a
      #      tempdir provider, which would collide with
      #      `tests/governance/test_qlib_init_singleton.py` if both
      #      ran in the same pytest invocation. Separate invocations
      #      isolate the singleton.
      #   2. PIT scaffolding (Phases A-D) is opt-in for the existing
      #      pipeline; keeping its tests in their own runs makes it
      #      obvious which suite a regression came from.
      - name: Run PIT data-pipeline tests (with coverage)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: pytest tests/data_pipeline/ -q --tb=short --cov=src --cov-append
        env:
          RUN_E2E: "0"

      - name: Run PIT data-pipeline tests
        if: matrix.os != 'ubuntu-latest' || matrix.python-version != '3.11'
        run: pytest tests/data_pipeline/ -q --tb=short
        env:
          RUN_E2E: "0"

      # PIT query-layer is the LAST suite — emits the consolidated
      # XML report covering every prior --cov-append accumulation.
      - name: Run PIT query-layer tests (with coverage)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: |
          pytest tests/pit/ -q --tb=short \
            --cov=src --cov-append \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing:skip-covered
        env:
          RUN_E2E: "0"

      - name: Run PIT query-layer tests
        if: matrix.os != 'ubuntu-latest' || matrix.python-version != '3.11'
        run: pytest tests/pit/ -q --tb=short
        env:
          RUN_E2E: "0"

      # Upload the consolidated coverage XML as a workflow artifact
      # so reviewers can download it from the PR Checks tab without
      # configuring an external Codecov account. Covers every test
      # suite (logic, governance, regression, data_pipeline, pit) —
      # the previous artifact name ``coverage-logic-xml`` reflected
      # the pre-#176 state where only logic/ ran with --cov; renamed
      # to match what it actually contains now.
      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn
          retention-days: 30
