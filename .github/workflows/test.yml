name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install git+https://github.com/microsoft/qlib.git@8fd6d5ca7eab59a69bf5c62f84e8b4e2a4e8910b
          pip install -e ".[dev]"
        continue-on-error: true

      - name: Lint (ruff)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: ruff check src/ tests/ scripts/

      - name: Type check (mypy)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: mypy src/ --ignore-missing-imports
        continue-on-error: true

      - name: Run logic tests
        run: pytest tests/logic/ -q --tb=short
        env:
          RUN_E2E: "0"

      - name: Run governance tests
        run: pytest tests/governance/ -q --tb=short

      - name: Run regression tests
        run: pytest tests/regression/ -q --tb=short
        env:
          RUN_E2E: "0"

      # PIT data-pipeline + query-layer tests live in their own
      # directories. We run them as SEPARATE pytest invocations
      # (not added to the directories above) for two reasons:
      #   1. The qlib canonical runtime is a process-singleton —
      #      `tests/pit/test_query_layer.py` initialises it with a
      #      tempdir provider, which would collide with
      #      `tests/governance/test_qlib_init_singleton.py` if both
      #      ran in the same pytest invocation. Separate invocations
      #      isolate the singleton.
      #   2. PIT scaffolding (Phases A-D) is opt-in for the existing
      #      pipeline; keeping its tests in their own runs makes it
      #      obvious which suite a regression came from.
      - name: Run PIT data-pipeline tests
        run: pytest tests/data_pipeline/ -q --tb=short
        env:
          RUN_E2E: "0"

      - name: Run PIT query-layer tests
        run: pytest tests/pit/ -q --tb=short
        env:
          RUN_E2E: "0"
