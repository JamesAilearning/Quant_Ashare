name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install git+https://github.com/microsoft/qlib.git@8fd6d5ca7eab59a69bf5c62f84e8b4e2a4e8910b
          pip install -e ".[dev]"
        continue-on-error: true

      - name: Lint (ruff)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: ruff check src/ tests/ scripts/

      - name: Type check (mypy)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: mypy src/ --ignore-missing-imports
        continue-on-error: true

      # Strict mode for the modules listed under [tool.mypy.overrides]
      # in pyproject.toml. These are the high-stakes modules where a
      # type regression would silently break the system (cache keys,
      # manifest schemas, regression-baseline comparators, embargo
      # guard). ``--follow-imports=silent`` suppresses noise from
      # transitively-imported legacy code so this step ONLY fails
      # on regressions inside the strict-mode modules. CI fails this
      # step (no ``continue-on-error``) — that's the whole point of
      # opt-in strict.
      - name: Type check strict modules (audit FU-7)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: |
          mypy --follow-imports=silent --ignore-missing-imports \
            src/data/_segment_embargo.py \
            src/data/bundle_manifest.py \
            src/data/_feature_dataset_cache.py \
            src/core/walk_forward/_resume.py \
            src/core/regression_baseline.py

      # Coverage runs on a single matrix slot (ubuntu-3.11) so we
      # collect one canonical coverage.xml per PR; running cov on all
      # 6 jobs would 6x the artifact storage for no extra signal.
      # The other 5 jobs still run the test suite for the
      # OS / Python coverage matrix; they just don't emit coverage.
      - name: Run logic tests (with coverage)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: |
          pytest tests/logic/ -q --tb=short \
            --cov=src --cov-report=xml:coverage-logic.xml \
            --cov-report=term-missing:skip-covered
        env:
          RUN_E2E: "0"

      - name: Run logic tests
        if: matrix.os != 'ubuntu-latest' || matrix.python-version != '3.11'
        run: pytest tests/logic/ -q --tb=short
        env:
          RUN_E2E: "0"

      - name: Run governance tests
        run: pytest tests/governance/ -q --tb=short

      - name: Run regression tests
        run: pytest tests/regression/ -q --tb=short
        env:
          RUN_E2E: "0"

      # PIT data-pipeline + query-layer tests live in their own
      # directories. We run them as SEPARATE pytest invocations
      # (not added to the directories above) for two reasons:
      #   1. The qlib canonical runtime is a process-singleton —
      #      `tests/pit/test_query_layer.py` initialises it with a
      #      tempdir provider, which would collide with
      #      `tests/governance/test_qlib_init_singleton.py` if both
      #      ran in the same pytest invocation. Separate invocations
      #      isolate the singleton.
      #   2. PIT scaffolding (Phases A-D) is opt-in for the existing
      #      pipeline; keeping its tests in their own runs makes it
      #      obvious which suite a regression came from.
      - name: Run PIT data-pipeline tests
        run: pytest tests/data_pipeline/ -q --tb=short
        env:
          RUN_E2E: "0"

      - name: Run PIT query-layer tests
        run: pytest tests/pit/ -q --tb=short
        env:
          RUN_E2E: "0"

      # Upload the coverage XML as a workflow artifact so reviewers
      # can download it from the PR Checks tab without configuring an
      # external Codecov account. Only runs on the slot that
      # collected coverage (ubuntu-3.11). The artifact also lets a
      # future Codecov / Coveralls integration just consume the same
      # file rather than re-running coverage.
      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-logic-xml
          path: coverage-logic.xml
          if-no-files-found: warn
          retention-days: 30
