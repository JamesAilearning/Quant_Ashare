# Smoke-test config — quick end-to-end verification after SH000300 ingestion.
# Short training (20 rounds), 1-month test window, default cost model.
# Use: D:/Python/Python11/python.exe main.py config_smoke.yaml

# qlib runtime — PIT bundle (coverage 2018-01-02 → 2025-12-31).
# Smoke windows below sit inside that span and leave a >=2 trading-day
# embargo gap between train/valid and valid/test (Alpha158 labels look
# ahead, so adjacent boundaries are rejected by FeatureDatasetBuilder).
provider_uri: "${QUANT_PROVIDER_URI:-D:/qlib_data/my_cn_data_pit}"
region: "cn"

# features
instruments: "csi300"
feature_handler: "Alpha158"
train_start: "2024-01-01"
train_end: "2025-06-20"
valid_start: "2025-07-01"
valid_end: "2025-09-19"
test_start: "2025-10-09"
test_end: "2025-10-31"

# model — tiny for speed
model_type: "LGBModel"
num_boost_round: 20
early_stopping_rounds: 5
learning_rate: 0.05
max_depth: 6
num_leaves: 32

# backtest
# Canonical total-return benchmark SH000300TR (applied at REGEN-2). SH000300 is the
# price-index REGEN-A control (audit E2).
benchmark_code: "SH000300TR"
init_cash: 100000000
commission_rate: 0.0005
# PIT historical ST/*ST exclusion (C2-d PR2), required on the SINGLE-FOLD
# path (audit E1 / PR-F): main.py passes require_st_mask=True, so a
# missing/blank value fails loud rather than silently including ST. This
# standalone smoke config does not extend config.yaml, so it carries its
# own env-overridable copy (QUANT_NAMECHANGE_PATH), parity with config.yaml.
namechange_path: "${QUANT_NAMECHANGE_PATH:-D:/qlib_data/tushare_raw/all_namechanges.parquet}"
# CN stamp tax: omit ``stamp_tax_schedule`` to inherit
# CN_STAMP_TAX_SCHEDULE_DEFAULT. This smoke window (2024-2025) is
# entirely post-2023-08-28 reform, so the runtime resolves to the
# 5.0 bps segment with no WARN. Audit P0-4 /
# openspec/changes/add-stamp-tax-schedule.
slippage_bps: 5.0
min_cost: 5.0
execution_price_kind: "close"
topk: 30
n_drop: 3

# factor analysis / attribution — skip for smoke speed
run_factor_analysis: false
run_attribution: false

# output
output_dir: "output/smoke"
