# Default preset — standard run (15-30 min)
mode: pipeline
instruments: csi800
feature_handler: Alpha158
model_type: LGBModel
compute_device: cpu
num_boost_round: 1000
early_stopping_rounds: 50
learning_rate: 0.005
# Canonical total-return benchmark SH000300TR (applied at REGEN-2).
# SH000300 is the price-index REGEN-A control (audit E2).
benchmark_code: SH000300TR
topk: 50
n_drop: 5
signal_to_execution_lag: 1
# Backtest / cost model (canonical defaults; identical across presets so
# switching presets resets these advanced knobs — codex P2 on #308).
adjust_mode: pre_adjusted
limit_threshold: 0.095
commission_rate: 0.0005
slippage_bps: 5.0
min_cost: 5.0
init_cash: 100000000.0
seed: 42
