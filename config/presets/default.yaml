# Default preset — standard run (15-30 min)
mode: pipeline
instruments: csi800
feature_handler: Alpha158
model_type: LGBModel
compute_device: cpu
num_boost_round: 1000
early_stopping_rounds: 50
learning_rate: 0.005
# Per-universe canonical benchmark ((b) Step 2): this preset trades the
# csi800 universe, so excess return is measured against the CSI800
# TOTAL-RETURN index — the previous SH000300TR here was a universe/basis
# mismatch (csi300 basket as the basis for a csi800 run). SH000300TR
# stays canonical for csi300/all universes (REGEN-2, audit E2).
benchmark_code: SH000906TR
topk: 50
n_drop: 5
signal_to_execution_lag: 1
# csi800 宇宙强制双 guard（v2-csi800-expansion-guards）：sleeve 分解 +
# 仓位级风险约束——config 层校验拒绝缺任一的 csi800 配置。
attribution_sleeve_grouping: true
risk_constraints_enabled: true
risk_constraints_calibration: "campaign_v1"
