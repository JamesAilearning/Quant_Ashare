# V2 Quantitative Trading Pipeline Configuration
# Copy this file and modify for your strategy experiments.

# qlib runtime
provider_uri: "D:/qlib_data/my_cn_data"
region: "cn"

# features
#
# IMPORTANT: these dates must point at periods the local qlib bundle
# actually covers — running with windows that fall after the bundle's
# tail produces empty datasets and a confusing run-time failure deep
# in the FeatureDatasetBuilder. Refresh this block when you ingest a
# newer data dump.
#
# Last verified bundle tail: 2026-03-06 (D:/qlib_data/my_cn_data).
instruments: "csi300"
feature_handler: "Alpha158"
train_start: "2022-01-01"
train_end: "2024-12-31"
valid_start: "2025-01-01"
valid_end: "2025-06-30"
test_start: "2025-07-01"
test_end: "2026-02-28"

# model
model_type: "LGBModel"
num_boost_round: 1000
early_stopping_rounds: 50
learning_rate: 0.0421
max_depth: 8
num_leaves: 210

# backtest
benchmark_code: "SH000300"
init_cash: 100000000
commission_rate: 0.0005
stamp_tax_bps: 10.0
slippage_bps: 5.0
min_cost: 5.0
execution_price_kind: "close"
topk: 50
n_drop: 5

# factor analysis (set to false to skip)
run_factor_analysis: true
factor_forward_period: 5
factor_top_n: 20
factor_max_decay_lag: 20

# performance attribution (set to false to skip)
run_attribution: true
# Optional real industry taxonomy for attribution. Leave all three empty to
# use the explicit board heuristic. When enabled, Pipeline validates both the
# taxonomy CSV and manifest before passing the map to attribution.
# industry_artifact_path: "output/taxonomy/sw_l2.csv"
# industry_manifest_path: "output/taxonomy/sw_l2.json"
# industry_taxonomy_id: "tushare_sw_l2"

# output
output_dir: "output"
