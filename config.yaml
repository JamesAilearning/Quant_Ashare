# V2 Quantitative Trading Pipeline Configuration
# Copy this file and modify for your strategy experiments.

# qlib runtime
provider_uri: "${QUANT_PROVIDER_URI:-D:/qlib_data/my_cn_data_pit}"
region: "cn"

# features
#
# IMPORTANT: these dates must point at periods the local qlib bundle
# actually covers — running with windows that fall after the bundle's
# tail produces empty datasets and a confusing run-time failure deep
# in the FeatureDatasetBuilder. Refresh this block when you ingest a
# newer data dump.
#
# PIT bundle coverage: 2018-01-02 → 2025-12-31 (D:/qlib_data/my_cn_data_pit).
# Windows below sit inside that span (clean PIT data, no survivorship bias)
# AND leave a >=2 trading-day embargo gap between train/valid and
# valid/test: Alpha158 labels look ahead, so FeatureDatasetBuilder rejects
# adjacent segment boundaries. test_end stops a few days short of the
# bundle tail so the single-fold backtest has a T+1 bar to execute on.
# ``instruments: "csi300"`` resolves to <provider>/instruments/csi300.txt, which
# the PIT bundle ships — no change needed beyond the provider_uri switch.
instruments: "csi300"
feature_handler: "Alpha158"
train_start: "2018-01-02"
train_end: "2023-12-20"
valid_start: "2024-01-02"
valid_end: "2024-12-18"
test_start: "2025-01-02"
test_end: "2025-12-19"

# model
#
# Tuned set, aligned to config_walk.yaml's model block. The previous values
# (learning_rate 0.0421 / num_leaves 210 / max_depth 8 / no L2) were the
# pathological "best_iteration plateau" set documented in
# src/core/model_trainer.py (ModelTrainConfig docstring) and config_walk.yaml:
# the high lr + over-expressive trees + no regularisation drove valid loss to
# its local optimum on the first split, so early-stopping fired at
# best_iter ≈ 1 — one giant tree, almost no score discrimination (top-50
# collapsed to a handful of distinct values). config_walk.yaml fixed this for
# the WF folds (best_iter 5-470); this brings the canonical training path
# (which trains the model daily_recommend loads) to the same tuned set.
model_type: "LGBModel"
num_boost_round: 1000
early_stopping_rounds: 50
learning_rate: 0.005
max_depth: 6
num_leaves: 64
lambda_l1: 0.0
lambda_l2: 1.0
min_data_in_leaf: 50
feature_fraction: 0.8
bagging_fraction: 0.8
bagging_freq: 5

# backtest
# CANONICAL benchmark = the TOTAL-RETURN index SH000300TR (dividends reinvested),
# ingested by scripts/data_pipeline/07_ingest_benchmark.py and APPLIED at REGEN-2.
# Strategy returns include dividends (adjusted closes), so the total-return benchmark
# is the honest basis; SH000300 (the PRICE index) overstates excess by ~the index
# dividend yield (~2-2.5pp/yr; audit E2) and is preserved only as the REGEN-A control.
benchmark_code: "SH000300TR"
init_cash: 100000000
commission_rate: 0.0005

# PIT historical ST/*ST exclusion (C2-d PR2), enabled on the SINGLE-FOLD
# path to match walk-forward + live recommend (audit E1 / PR-F). The
# backtest drops names that were ST/*ST on each execution day
# (reconstructed point-in-time from the tushare namechange table; see
# src/data/st_history.py). Env-overridable via QUANT_NAMECHANGE_PATH
# (default below = current path), matching config_walk.yaml. The official
# single-fold path passes require_st_mask=True, so a missing/blank value
# fails loud rather than silently including ST. Enabling this changes the
# single-fold (fold0) baseline vs the includes-ST one — regenerate it at
# REGEN via RUN_E2E (tests/regression/fixtures/README.md).
namechange_path: "${QUANT_NAMECHANGE_PATH:-D:/qlib_data/tushare_raw/all_namechanges.parquet}"
# CN stamp tax: omit ``stamp_tax_schedule`` to inherit
# CN_STAMP_TAX_SCHEDULE_DEFAULT, which models the 2023-08-28 reform
# (0.1% → 0.05% sell-only). This window (2018-2025) crosses the
# reform date; the runtime will WARN and use a trading-day-weighted
# scalar across the two segments.
#
# To OVERRIDE the schedule, write entries whose first
# ``effective_from`` is on or before ``test_start`` — the runtime
# raises ``CanonicalBacktestContractError`` if the period starts
# before the schedule's earliest entry. For a 2018-2025 window,
# that means the first entry must be ≤ 2018-01-02. Example
# overriding to a single pinned post-reform rate (only valid for
# windows whose start is also on/after 2023-08-28):
#   stamp_tax_schedule:
#     - {effective_from: 2023-08-28, bps: 5.0}
# For a custom 2-entry override on a 2022-onward window, mirror
# the default's earliest entry:
#   stamp_tax_schedule:
#     - {effective_from: 2008-09-19, bps: 10.0}
#     - {effective_from: 2023-08-28, bps: 5.0}
# Audit P0-4 / openspec/changes/add-stamp-tax-schedule.
slippage_bps: 5.0
min_cost: 5.0
execution_price_kind: "close"
topk: 50
n_drop: 5

# factor analysis (set to false to skip)
run_factor_analysis: true
factor_forward_period: 5
factor_top_n: 20
factor_max_decay_lag: 20

# performance attribution (set to false to skip)
run_attribution: true
# Optional real industry taxonomy for attribution. Leave all three empty to
# use the explicit board heuristic. When enabled, Pipeline validates both the
# taxonomy CSV and manifest before passing the map to attribution.
# industry_artifact_path: "output/taxonomy/sw_l2.csv"
# industry_manifest_path: "output/taxonomy/sw_l2.json"
# industry_taxonomy_id: "tushare_sw_l2"

# output
output_dir: "output"
