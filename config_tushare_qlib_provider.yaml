# Tushare OHLCV -> qlib provider bundle ingest config.
#
# The Tushare token must come from the TUSHARE_TOKEN environment variable.
# Do not put tushare_token/token/api_token in this file; the loader rejects
# those keys so secrets do not land in committed config.
#
# Example:
#   $env:TUSHARE_TOKEN = "your_pro_token_here"  # PowerShell
#   python -m pip install -e ".[tushare]"
#   python scripts/ingest_tushare_qlib_provider.py config_tushare_qlib_provider.yaml

output_dir: "output/qlib_tushare"
staging_dir: "output/qlib_tushare_staging"
manifest_path: "output/qlib_tushare_manifest.json"
validation_path: "output/qlib_tushare_validation.json"
comparison_path: "output/qlib_tushare_comparison.json"

# Use a short window for smoke ingestion first. Expand only after preflight
# succeeds and account rate limits are understood.
start_date: "2025-01-01"
end_date: "2025-01-31"

# Use "all" for the whole A-share market, or a list like:
# instruments: ["SH600000", "SZ000001"]
# The generated qlib bundle currently writes instruments/all.txt. For training
# against this bundle, set PipelineConfig.instruments to "all" unless you add a
# separate index-specific instrument file.
instruments: "all"

# Must match QlibRuntimeConfig.data_adjust_mode and PipelineConfig.adjust_mode
# when training/backtesting on the generated bundle.
data_adjust_mode: "pre_adjusted"

# Optional existing provider path for informational A/B coverage checks.
# baseline_provider_uri: "D:/qlib_data/my_cn_data"

reuse_staged: true
region: "cn"
freq: "day"
