# PIT reference cases — Phase 0.2 user-curated seed
#
# This file is the test oracle for the v2-ashare-survivorship-correction
# capability. Every row in this file is hand-verified by the user against
# Tushare API responses pulled on 2026-05-22 (5000-point Pro tier).
#
# Coverage matrix (from docs/pit/pit_universe_design.md §9.2):
#
#   Pre-2020 financial delisting              → SH600087 退市长油
#   2020-2022 *ST → 退市 mainstream era       → SH600247 *ST成城退
#   2024+ post-退市新规 strict era            → SZ000023 *ST深天退
#   ChiNext delisting                          → SZ300297 蓝盾退
#   STAR board delisting                       → SH688086 退市紫晶
#   Same-day multi-stock batch delisting       → batch_20220622 (6 stocks)
#   Active stock negative control              → SH600519 贵州茅台
#   CSI300 constituent change — enter          → SH601816 京沪高铁 2020-06-30
#   CSI300 constituent change — leave          → SH600100 同方股份 2020-06-30
#
# Hard rule (§14.7): future additions to this file MUST cite the Tushare
# API response (stock_basic / namechange / index_weight row) in the PR
# body, per row. PRs with uncited reference rows are rejected.

