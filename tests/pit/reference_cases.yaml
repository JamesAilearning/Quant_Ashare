index_membership_cases:
  csi300:
    # Replaces the earlier SZ002594 (BYD) / SH600015 (华夏银行) rows
    # which a Tushare 2010-2024 full-history pull (see PR addressing
    # PR #102 follow-up) showed were CONTINUOUSLY in CSI300 across
    # every snapshot in the window — i.e. neither had the asserted
    # enter / leave event in any Tushare-observable timeframe. The
    # original rows were committed in PR #97 with cite_tushare blocks
    # that asserted "absent on date X" without actually pulling that
    # snapshot, so Tushare never validated the claims. Replaced here
    # with two CSI300 rebalance events from 2020-06 whose Tushare
    # presence transitions ARE directly verifiable.

    - ticker: SH601816
      action: enter
      date: 2020-06-30
      note: 京沪高铁 entered CSI300 (2020-01 IPO; first rebalance inclusion in 2020-06 review)
      cite_tushare: |
        index_weight(index_code='000300.SH', start_date='20100101',
                     end_date='20241231'), pulled in yearly chunks
        on 2026-05-22:
          148 monthly snapshots over the window.
          SH601816 first appears on 20200630 snapshot.
          SH601816 NOT in 20200608 snapshot.
        Tushare snapshot transition: ABSENT 2020-06-08 -> PRESENT
        2020-06-30. The Phase A.4 resolver's ±35d tolerance matches
        this against the asserted enter date.

    - ticker: SH600100
      action: leave
      date: 2020-06-30
      note: 同方股份 dropped from CSI300 in the 2020-06 review
      cite_tushare: |
        Same 2010-2024 yearly-chunk pull, 2026-05-22:
          SH600100 last appears on 20200608 snapshot.
          SH600100 NOT in 20200630 snapshot.
        Tushare snapshot transition: PRESENT 2020-06-08 -> ABSENT
        2020-06-30. Resolver's ±35d tolerance matches against the
        asserted leave date.
