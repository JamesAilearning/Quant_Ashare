index_membership_cases:
  csi300:
    - ticker: SZ002594
      action: enter
      date: 2019-12-13
      note: BYD entered CSI300
      cite_tushare: |
        index_weight(index_code='000300.SH', start_date='20191201',
                     end_date='20191231'), 2026-05-22 pull:
          snapshot dates returned: ['20191231']
          20191231: 002594.SZ PRESENT, weight=0.313
        (Tushare returns monthly snapshots; the entry day 2019-12-13
        falls between the 2019-11-30 absence and the 2019-12-31
        presence, so the entry-boundary assertion is "absent on
        20191130 snapshot, present on 20191231 snapshot".)

    - ticker: SH600015
      action: leave
      date: 2022-06-13
      note: 华夏银行 dropped from CSI300
      cite_tushare: |
        index_weight(index_code='000300.SH', start_date='20220601',
                     end_date='20220630'), 2026-05-22 pull:
          snapshot dates returned: ['20220601', '20220630']
          20220601: 600015.SH PRESENT, weight=0.1793
          20220630: 600015.SH PRESENT, weight=0.153
        (Membership flipped intra-month around the asserted 2022-06-13
        leave date but both bracketing snapshots show presence; the
        index_weight resolver in Phase A.4 needs to consult Tushare's
        actual entry/exit announcements for sub-monthly precision.
        Recorded here as a known data-granularity caveat — Phase A.4
        SHALL surface this in the test failure message rather than
        silently passing.)
