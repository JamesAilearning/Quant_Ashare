# Walk-forward configuration — N=3 cross-fold ensemble experiment.
#
# What this changes vs config_walk.yaml
# -------------------------------------
# 1. ``ensemble_window: 3`` — each fold's predictions are the equal-
#    weighted mean of the current model + up to 2 prior fold models
#    (replayed against the current dataset). Fold 0 has no priors and
#    naturally degrades to current-only; fold 1 has 1 prior; fold ≥ 2
#    sees the full N=3 window.
# 2. ``output_dir: output/walk_forward_industry_n3`` — separate
#    artifact directory so the baseline at ``output/walk_forward_industry/``
#    stays intact for diff comparison.
#
# Everything else is identical to ``config_walk.yaml`` so the only
# variable changing is the ensemble window. That keeps the comparison
# clean: any IC / return / drawdown delta is attributable to the
# averaging, not to a hyperparameter shift.
#
# Why N=3
# -------
# The baseline run showed sign flips in selection effect on the same
# sector within a single quarter (semiconductors: -0.62% fold 5 vs
# +0.88% fold 7). Most of that is parameter noise from re-fitting on
# overlapping training windows; averaging the most recent 3 models
# smooths it out without going so far back that the prior windows
# hold genuinely different market regimes.

# qlib runtime
provider_uri: "D:/qlib_data/my_cn_data"
region: "cn"

# Universe & features (identical to baseline)
instruments: "csi300"
feature_handler: "Alpha158"

# Overall walk-forward range (identical to baseline)
overall_start: "2022-01-01"
overall_end:   "2026-02-28"

# Window sizes (identical to baseline)
train_months: 24
valid_months: 3
test_months: 3
step_months: 3

# Cross-fold ensemble — the ONE thing that differs from baseline
ensemble_window: 3

# Model — identical to baseline
model_type: "LGBModel"
num_boost_round: 1000
early_stopping_rounds: 50
learning_rate: 0.005
max_depth: 6
num_leaves: 64
lambda_l1: 0.0
lambda_l2: 1.0
min_data_in_leaf: 50
feature_fraction: 0.8
bagging_fraction: 0.8
bagging_freq: 5

# Backtest — identical to baseline
benchmark_code: "SH000300"
init_cash: 100000000
topk: 50
n_drop: 5
commission_rate: 0.0005
stamp_tax_bps: 10.0
slippage_bps: 5.0

# Per-fold attribution — same Shenwan L2 taxonomy as baseline so the
# fold-by-fold sector breakdown is directly comparable.
run_attribution: true
industry_artifact_path: "output/taxonomy/sw_l2.csv"
industry_manifest_path: "output/taxonomy/sw_l2.json"
industry_taxonomy_id: "tushare_sw_l2"

# Output — separate dir so baseline stays untouched
output_dir: "output/walk_forward_industry_n3"
