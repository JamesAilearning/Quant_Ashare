# ---- 一次性终裁状态(machine-checked, codex #352 r10 P1) --------------------
#   终裁 run 点火后立即: 本字段翻为 true + 追加 unblinding 条目(E011+) +
#   commit。gate 对任何后续 --final-adjudication 见 true 即永拒 —— 重复终裁
#   = 在已签 holdout 上迭代,选择偏差直接回灌"未触碰窗"。一次裁决,永不重来;
#   本家族此后任何工作 = 新计划 + 新未触碰窗。字段缺失/非布尔 = 账本畸形,
#   gate 一律拒(fail-loud)。
holdout_unblinded: false

# ---- 有效试验计数规则(DSR/PBO 输入,冻结时锁死) --------------------------
effective_trials_rule: >-
  有效试验数 N = registered_candidates(3) + 预注册敏感性切片中改变"因子定义或
  主判窗口"者(C1_from_2018 计 1;持有期/ST/分档切片为同一因子的稳健性观测,
  按 Harvey-Liu 保守惯例仍全部计入) + 任何冻结后新增条目。当前冻结时点
  N = 3 候选 + 6 切片 = 9;若 Gate-4 过程产生任何未注册探索,先记账再跑。

