# companion artifacts(与本 yaml 一并 committed 冻结):
#   docs/prereg/quality_profitability_ledger.yaml     —— research ledger(本次起草)
#   docs/prereg/quality_profitability_rehearsal.md    —— gate rehearsal(本次起草)
#   docs/prereg/quality_profitability_pit_preflight_gate3.md —— 折结构/日历/holdout
#       preflight 证据(冻结时产出,含 manifest + folds + holdout 待签项)
